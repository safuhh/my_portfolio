# ─────────────────────────────────────────────────────────────────
# CD — Deploy to Production VPS
# ─────────────────────────────────────────────────────────────────
# Triggers on push to main (after PR merge) or manual dispatch.
# Verifies build, then SSHs to VPS and runs deploy.sh.
# ─────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

# CRITICAL: Never cancel a running deploy — could leave VPS in broken state
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─── Build Verification ──────────────────────────────────────────
  # Quick sanity check before touching production
  build:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

  # ─── Deploy to VPS ──────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            cd /home/${{ secrets.VPS_USER }}/apps/portfolio
            ./scripts/deploy.sh
