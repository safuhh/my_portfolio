services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio
    restart: unless-stopped
    ports:
      # IMPORTANT: 127.0.0.1 ensures only host nginx can reach this container.
      # Without it, Docker opens the port on ALL interfaces, bypassing your firewall.
      - "127.0.0.1:3100:8080"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
