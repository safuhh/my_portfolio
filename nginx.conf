worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression — reduces transfer size ~70% for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Next.js static export routing
        # Handles: /about → /about.html, /projects → /projects/index.html
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Content-hashed static assets — cache forever
        # Next.js names these with hashes: /_next/static/chunks/abc123.js
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Fonts — cache for 1 year (they rarely change)
        location /fonts/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Images — cache for 30 days
        location /images/ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Health check endpoint — used by Docker HEALTHCHECK and deploy script
        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Security: deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
